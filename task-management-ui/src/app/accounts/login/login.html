<div class="login-container">
  <div class="login-box">

    <!-- Left: Branding -->
    <div class="login-image">
      <img src="assets/images/logo.png" alt="Brand Logo" width="220" />
    </div>

    <!-- Right: Form -->
    <div class="login-form-section">

      <div class="logo-container">
        <img src="assets/images/logo.png" alt="App Logo" class="login-logo" />
      </div>

      <h2 class="login-title">Welcome Back</h2>
      <p class="login-subtitle">Please enter your credentials to continue</p>

      <form [formGroup]="loginForm" (ngSubmit)="onSignin()">

        <!-- Username / Email -->
        <div class="form-group">
          <p-inputgroup>
            <p-inputgroup-addon>
              <i class="pi pi-user"></i>
            </p-inputgroup-addon>
            <input pInputText type="text" placeholder="Username or Email" formControlName="username"
              autocomplete="off" />
          </p-inputgroup>
          <app-validation-message [formCtrl]="loginForm.get('username')" [type]="'Username'" />
        </div>

        <!-- Password -->
        <div class="form-group">
          <p-inputgroup>
            <p-inputgroup-addon>
              <i class="pi pi-lock"></i>
            </p-inputgroup-addon>
            <input pInputText [type]="showPassword ? 'text' : 'password'" placeholder="Password"
              formControlName="password" />
            <p-inputgroup-addon class="password-toggle" (click)="showPassword = !showPassword">
              <i [ngClass]="showPassword ? 'pi pi-eye-slash' : 'pi pi-eye'"></i>
            </p-inputgroup-addon>
          </p-inputgroup>
          <app-validation-message [formCtrl]="loginForm.get('password')" [type]="'Password'" />
        </div>

        <!-- Submit -->
        <div class="button-container text-center">
          <p-button type="submit" label="Log In" icon="pi pi-sign-in" styleClass="w-full" [disabled]="isSubmitLoader"
            [loading]="isSubmitLoader" />
        </div>

        <!-- Forgot Password -->
        <div class="forgot-password">
          <a routerLink="/account/forget-password">Forgot Password?</a>
        </div>

      </form>
    </div>

  </div>
</div>

<p-toast />
